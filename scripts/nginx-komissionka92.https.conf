# Прод: HTTPS для komissionka92.ru (после выпуска Let's Encrypt).
# 1) Временно подключите nginx-komissionka92.conf (только :80), убедитесь что DNS A/AAAA указывают на сервер.
# 2) Выпустите сертификат на ОБА имени (иначе Kaspersky/браузеры: «недопустимое имя сертификата» при заходе на www):
#    sudo certbot certonly --nginx -d komissionka92.ru -d www.komissionka92.ru
#    # или: sudo certbot --nginx -d komissionka92.ru -d www.komissionka92.ru
# 3) Замените vhost на этот файл (или смержите блоки), затем: sudo nginx -t && sudo systemctl reload nginx
# 4) В .env: NEXTAUTH_URL=https://komissionka92.ru, APP_BASE_URL=https://komissionka92.ru, AUTH_TRUST_HOST=true

server {
    listen 80;
    listen [::]:80;
    server_name komissionka92.ru www.komissionka92.ru;
    return 301 https://komissionka92.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.komissionka92.ru;

    ssl_certificate /etc/letsencrypt/live/komissionka92.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/komissionka92.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # При ошибке nginx -t: раскомментируйте после `sudo certbot ...` или удалите строку
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://komissionka92.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name komissionka92.ru;

    # Hero и др. загрузки в админке (Next proxyClientMaxBodySize 40mb)
    client_max_body_size 40m;

    ssl_certificate /etc/letsencrypt/live/komissionka92.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/komissionka92.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}
